name = "nkmedicalsbote"
main = "worker.js"
compatibility_date = "2024-11-01"

# Перед `wrangler dev` / `wrangler deploy` создаётся `mini-app/dist` (нужно для Workers Builds и локального deploy без ручной сборки).
[build]
command = "npm run build:mini-app"
watch_dir = "mini-app/src"

# Статика React Mini App (сборка: npm run build:mini-app). Worker обрабатывает запрос первым
# (`run_worker_first`), затем для /api/* и /webhook отвечает сам; остальное — ASSETS.
[assets]
directory = "./mini-app/dist"
binding = "ASSETS"
run_worker_first = true

# -----------------------------------------------------------------------------
# ВАЖНО ПРО РЕЖИМЫ РАБОТЫ БОТА (webhook vs long polling)
# -----------------------------------------------------------------------------
# В этом репозитории есть два “способа запуска” Telegram-бота:
#
# 1) `bot.js` — long polling (Node.js процесс, запускается `npm run start`)
#    - удобен для локальной разработки / простого VPS
#    - состояние (`sessions`) хранится в памяти процесса
#    - Telegram НЕ должен быть настроен на webhook, иначе polling-процесс
#      может получать ошибки/конфликты (Telegram будет слать апдейты в webhook)
#
# 2) `worker.js` — webhook (Cloudflare Worker, конфигурируется этим файлом)
#    - Telegram шлёт апдейты HTTP POST'ом в ваш endpoint `/webhook`
#    - для идемпотентности и устойчивости обычно используется D1 (см. schema.sql)
#    - может работать вместе с cron-триггерами (напоминания)
#
# Нельзя одновременно “нормально” использовать webhook и long polling
# для одного и того же BOT_TOKEN. Перед сменой режима нужно:
# - либо удалить webhook (setWebhook с пустым url) и запускать polling,
# - либо наоборот: выставить webhook и не запускать второй polling-инстанс.
#
# Раз в минуту проверяем, кому пора отправить напоминание
[triggers]
crons = ["* * * * *"]

# 1) Секреты: wrangler secret put BOT_TOKEN
#    wrangler secret put MINI_APP_URL  → https://<worker>.workers.dev/app/
#    Опционально: wrangler secret put WEBHOOK_SECRET (случайная строка; тот же в setWebhook)
# 2) Схема D1 (удалённо): npm run db:init:remote
# 3) Деплой: npm run deploy (или npx wrangler deploy — секция [build] соберёт mini-app). В Workers Builds задайте Build command: npm run build
# 4) Webhook: WEBHOOK_URL=https://<worker>/webhook npm run webhook:set
# Локально: .dev.vars (BOT_TOKEN, опц. WEBHOOK_SECRET), затем npm run db:init:local
# Точка входа Worker: worker.js (в корне рядом с wrangler.toml — так надёжнее для CI)

[[d1_databases]]
binding = "DB"
database_name = "telegram_bot_db"
database_id = "5eb1bb9b-9d6a-47f7-9515-80459494e1ec"
